pluginManagement {
repositories {
mavenCentral()
gradlePluginPortal()
maven {
name "Fabric"
url "https://maven.fabricmc.net/"
}
maven {
name "Quilt"
url "https://maven.quiltmc.org/repository/release"
}
maven {
name "Kiku Releases"
url "https://maven.kikugie.dev/releases"
}
maven {
name = "FeatherPlugin GitHub Packages"
url = uri("https://maven.pkg.github.com/darkz70/FeatherPlugin")
credentials {
username = System.getenv("GITHUB_ACTOR")
password = System.getenv("GITHUB_TOKEN")
}
}
}
}

plugins {
