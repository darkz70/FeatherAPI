plugins {
id "net.darkz70.feather-plugin-core" version "1.0"
id "net.darkz70.feather-plugin-stonecutter" version "1.0"
id "maven-publish"
}

feather {
loader           = stonecutter.current.project.substring(0, stonecutter.current.project.indexOf("-"))
mappings = "official"
	minecraftVersion = stonecutter.current.version.toString()
loaderVersion    = prop("build.fabric_loader")
lombok           = prop("base.lombok_version")
fabricApi        = prop("build.fabric_api")

additional {
// Example: disable("cit-resewn")
}
}

stonecutter {
replacements.string(current.parsed >= "26.1") {
replace("net.minecraft.client.gui.GuiGraphics", "net.minecraft.client.gui.GuiGraphicsExtractor")
replace("GuiGraphics", "GuiGraphicsExtractor")
t	replacements.string(current.parsed >= "26.2") {
			replace("net.minecraft.client.renderer.MultiBufferSource", "com.mojang.blaze3d.vertex.MultiBufferSource")
		}
}
}

publishing {
repositories {
maven {
name = "GitHubPackages"
url  = uri("https://maven.pkg.github.com/darkz70/FeatherAPI")
credentials {
username = System.getenv("GITHUB_ACTOR")
password = System.getenv("GITHUB_TOKEN")
}
}
mavenLocal()
}

publications {
featherAPI(MavenPublication) {
groupId = "${prop("data.mod_maven_group")}"
artifactId = prop("data.mod_id")
version = "${prop("data.mod_version")}-${stonecutter.current.project}"
from components.java
}
}
}

String prop(String key) {
return findProperty(key).toString()
}
